global:
  smtp_smarthost: '${ALERTMANAGER_SMTP_HOST:-localhost:25}'
  smtp_from: '${ALERTMANAGER_SMTP_FROM:-alerts@evzone.local}'
  slack_api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL:-}'
  pagerduty_url: '${ALERTMANAGER_PAGERDUTY_URL:-https://events.pagerduty.com/v2/enqueue}'

route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 30m
      continue: true
    - match:
        severity: warning
      receiver: 'warning'
      group_interval: 5m
      repeat_interval: 2h
      continue: true
    - match:
        severity: info
      receiver: 'info'
      continue: false

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['service']

receivers:
  - name: 'default'
    email_configs:
      - to: '${ALERTMANAGER_DEFAULT_EMAIL:-oncall@evzone.local}'
        send_resolved: true

  - name: 'critical'
    pagerduty_configs:
      - service_key: '${ALERTMANAGER_PAGERDUTY_SERVICE_KEY:-}'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
    slack_configs:
      - channel: '${ALERTMANAGER_SLACK_CRITICAL_CHANNEL:-#alerts-critical}'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'
        send_resolved: true
    email_configs:
      - to: '${ALERTMANAGER_CRITICAL_EMAIL:-oncall-critical@evzone.local}'
        send_resolved: true

  - name: 'warning'
    slack_configs:
      - channel: '${ALERTMANAGER_SLACK_WARNING_CHANNEL:-#alerts-warning}'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'
        send_resolved: true
    email_configs:
      - to: '${ALERTMANAGER_WARNING_EMAIL:-oncall-warning@evzone.local}'
        send_resolved: true

  - name: 'info'
    email_configs:
      - to: '${ALERTMANAGER_INFO_EMAIL:-oncall-info@evzone.local}'
        send_resolved: false
